<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전시의 숲 - 전시기획자 포트폴리오</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-trees">
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="tree tree-3"></div>
        <div class="tree tree-4"></div>
        <div class="tree tree-5"></div>
    </div>

    <div class="container">
        <header class="header">
            <nav class="navbar">
                <h1 class="logo">🌿 전시의 숲</h1>
                <ul class="nav-links">
                    <li><a href="#intro">소개</a></li>
                    <li><a href="#projects">작품</a></li>
                    <li><a href="#contact">연락</a></li>
                </ul>
            </nav>
        </header>

        <section class="hero" id="intro">
            <div class="hero-content">
                <div class="intro-text">
                    <h2 class="greeting">안녕하세요</h2>
                    <div class="animated-title">
                        <span class="title-word">전시</span>
                        <span class="title-word">공간을</span>
                        <span class="title-word">만드는</span>
                    </div>
                    <p class="dream-text">전시기획자입니다</p>
                </div>

                <div class="animation-container">
                    <div class="floating-plant">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <path d="M 30 60 L 35 85 L 65 85 L 70 60 Z" fill="#D4A574" stroke="#8B6F47" stroke-width="2"/>
                            <ellipse cx="50" cy="60" rx="20" ry="8" fill="#C29A5F" stroke="#8B6F47" stroke-width="2"/>
                            <ellipse cx="50" cy="62" rx="18" ry="6" fill="#7A6B5D"/>
                            <path d="M 50 62 Q 48 40 50 20" stroke="#2D5016" stroke-width="3" fill="none" stroke-linecap="round"/>
                            <ellipse cx="40" cy="35" rx="8" ry="12" fill="#3D7D2E" transform="rotate(-35 40 35)"/>
                            <ellipse cx="60" cy="35" rx="8" ry="12" fill="#4A9D3A" transform="rotate(35 60 35)"/>
                            <ellipse cx="45" cy="25" rx="7" ry="11" fill="#2D5016" transform="rotate(-25 45 25)"/>
                            <ellipse cx="55" cy="25" rx="7" ry="11" fill="#3D7D2E" transform="rotate(25 55 25)"/>
                            <ellipse cx="50" cy="15" rx="6" ry="10" fill="#4A9D3A"/>
                        </svg>
                    </div>

                    <div class="falling-leaves">
                        <div class="leaf leaf-1">🍃</div>
                        <div class="leaf leaf-2">🍃</div>
                        <div class="leaf leaf-3">🍃</div>
                        <div class="leaf leaf-4">🍃</div>
                        <div class="leaf leaf-5">🍃</div>
                    </div>
                </div>
            </div>

            <div class="intro-description">
                <p>
                    공간을 통해 감정을 전달하고,<br>
                    전시를 통해 이야기를 나눕니다.<br>
                    <span class="highlight">작은 전시부터 대규모 프로젝트까지</span><br>
                    정성스러운 경험을 만들어갑니다.
                </p>
            </div>
        </section>

        <div class="divider">
            <span class="divider-leaf">🌿</span>
        </div>

        <div class="scroll-indicator">
            <p>아래로 스크롤 ↓</p>
            <div class="scroll-arrow">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
